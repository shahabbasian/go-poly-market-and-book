  /rewards/markets/multi:
    get:
      summary: Get multiple markets with rewards
      description: >
        Returns a list of active markets with their reward configurations.

        Supports text search, tag filtering, numeric filters, and sorting.


        Results are paginated (100 items per page by default). Use next_cursor
        to fetch subsequent pages.

        A next_cursor value of "LTE=" indicates the last page.
      operationId: getMultiMarkets
      tags:
        - Rewards
      parameters:
        - name: q
          in: query
          description: Text search on market question/description
          required: false
          schema:
            type: string
        - name: tag_slug
          in: query
          description: >-
            Filter by tag slug. Can be repeated for OR logic (e.g.,
            ?tag_slug=sports&tag_slug=politics)
          required: false
          schema:
            type: string
        - name: event_id
          in: query
          description: >-
            Filter by event ID. Can be repeated for multiple events (e.g.,
            ?event_id=100&event_id=200)
          required: false
          schema:
            type: string
        - name: event_title
          in: query
          description: Search event titles using case-insensitive pattern matching
          required: false
          schema:
            type: string
        - name: order_by
          in: query
          description: Field to sort results by
          required: false
          schema:
            type: string
            enum:
              - market_id
              - created_at
              - volume_24hr
              - spread
              - competitiveness
              - max_spread
              - min_size
              - question
              - one_day_price_change
              - rate_per_day
              - price
              - end_date
              - start_date
              - reward_end_date
        - name: position
          in: query
          description: Sort direction
          required: false
          schema:
            type: string
            enum:
              - ASC
              - DESC
        - name: min_volume_24hr
          in: query
          description: Minimum 24-hour volume filter
          required: false
          schema:
            type: number
            format: double
        - name: max_volume_24hr
          in: query
          description: Maximum 24-hour volume filter
          required: false
          schema:
            type: number
            format: double
        - name: min_spread
          in: query
          description: Minimum spread filter
          required: false
          schema:
            type: number
            format: double
        - name: max_spread
          in: query
          description: Maximum spread filter
          required: false
          schema:
            type: number
            format: double
        - name: min_price
          in: query
          description: Minimum first token price filter
          required: false
          schema:
            type: number
            format: double
        - name: max_price
          in: query
          description: Maximum first token price filter
          required: false
          schema:
            type: number
            format: double
        - name: next_cursor
          in: query
          description: Pagination cursor from previous response
          required: false
          schema:
            type: string
        - name: page_size
